name: tests

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package and quality tools
        run: python -m pip install -e ".[dev]"
      - name: Lint Python
        run: python -m ruff check src tests scripts
      - name: Check package import
        run: python -c "import raemf_mc; import raemf_mc.pipeline"
      - name: Unit and smoke tests
        env:
          MPLCONFIGDIR: /tmp/matplotlib-raemf
        run: python -m pytest -q
      - name: Explicit Markdown and image validation
        run: python -m pytest -q tests/test_markdown.py
